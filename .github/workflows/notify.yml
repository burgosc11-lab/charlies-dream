name: Dividend Push Notifications

on:
  schedule:
    - cron: '0 15 * * 1-5'   # 9am MDT (UTC-6)
  workflow_dispatch:
    inputs:
      test:
        description: 'Send test push (bypasses date check)'
        required: false
        default: 'false'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install web-push
        run: npm install web-push

      - name: Send push notifications
        env:
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:     ${{ secrets.VAPID_SUBJECT }}
          TEST_PUSH:         ${{ github.event.inputs.test }}
          # PUSH_SUBSCRIPTION secret no longer needed - subscription is now saved
          # automatically to push_subscription.json when user taps Subscribe in the app.
        run: node notify.js
