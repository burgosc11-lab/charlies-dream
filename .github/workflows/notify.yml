name: Dividend Push Notifications

on:
  schedule:
    - cron: '0 15 * * 1-5'   # ← change 12 to 15   # 9am MDT (UTC-6)
  workflow_dispatch:   # lets you trigger manually from the Actions tab

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install web-push
        run: npm install web-push

      - name: Send push notifications
        env:
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:     ${{ secrets.VAPID_SUBJECT }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: node notify.js
