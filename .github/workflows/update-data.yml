name: Update Dividend Data

on:
  # Run every weekday at 12:00 UTC (8:00 AM Eastern / 7:00 AM Central)
  # Market opens at 9:30 AM ET — this runs before open so data is fresh
  schedule:
    - cron: '0 12 * * 1-5'

  # Also allow manual trigger from the GitHub Actions tab at any time
  workflow_dispatch:

# Required so the bot can write data.json back to the repo
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch dividend data from Yahoo Finance
        run: node fetch-dividends.js

      - name: Commit and push updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json unchanged — nothing to commit"
          else
            git commit -m "📊 Update dividend data — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
