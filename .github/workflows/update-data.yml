name: Update Dividend Data

on:
  # Run every weekday at 13:30 UTC (9:30 AM Eastern — market open)
  schedule:
    - cron: '30 13 * * 1-5'

  # Allow manual trigger from the GitHub Actions tab at any time
  workflow_dispatch:

# Required so the bot can write data.json back to the repo
permissions:
  contents: write

env:
  # Opt into Node.js 24 now to avoid the deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Fetch dividend data from Yahoo Finance
        run: node fetch-dividends.js

      - name: Commit and push updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "data.json unchanged — nothing to commit"
          else
            git commit -m "📊 Update dividend data — $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
